name: CI-CD
on: 
  push:
    branches: ["main"]
  workflow_dispatch: 
jobs: 
  CI: 
    runs-on: ubuntu-latest
    steps:
      - name: Pegando base do codigo
        uses: actions/checkout@v6
      - name: Authenticando no Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Buildando a imagem
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            franciscosant/api-model-node:v${{ github.run_number}}
            franciscosant/api-model-node:latest
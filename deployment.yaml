apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-node
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-node
  template:
    metadata:
      labels:
        app: api-node
    spec:
      containers:
        - name: api-node
          image: franciscosant/api-model-node
          ports:
            - containerPort: 8000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "8000"
---
apiVersion: v1
kind: Service
metadata:
  name: api-node-service
spec:
  selector:
    app: api-node
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: LoadBalancer